<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Expense Dashboard</title>
  <script src="https://d3js.org/d3.v7.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0f0f0f;
      --surface: #1a1a1a;
      --surface2: #252525;
      --border: #2e2e2e;
      --text: #f0f0f0;
      --muted: #888;
      --accent: #4ade80;
      --danger: #f87171;
      --pill-active-bg: #f0f0f0;
      --pill-active-text: #0f0f0f;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
    }

    /* ── Page wrapper ── */
    .page-wrap {
      max-width: 1280px;
      margin: 0 auto;
      padding: 0 0 2rem;
    }

    /* ── Header ── */
    header {
      padding: 1.25rem 1.25rem 0.75rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    header h1 { font-size: 1.25rem; font-weight: 700; }
    .subtitle { font-size: 0.75rem; color: var(--muted); margin-top: 0.125rem; }

    /* ── Range filter bar ── */
    .filter-bar {
      display: flex;
      gap: 0.5rem;
      padding: 0.5rem 1.25rem 1rem;
      overflow-x: auto;
      scrollbar-width: none;
    }
    .filter-bar::-webkit-scrollbar { display: none; }

    .pill {
      flex-shrink: 0;
      padding: 0.375rem 0.875rem;
      border-radius: 999px;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--muted);
      font-size: 0.8rem;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.15s, color 0.15s, border-color 0.15s;
      white-space: nowrap;
    }
    .pill.active {
      background: var(--pill-active-bg);
      color: var(--pill-active-text);
      border-color: var(--pill-active-bg);
    }
    .pill:not(.active):hover {
      border-color: #555;
      color: var(--text);
    }

    /* ── Cards ── */
    .card {
      background: var(--surface);
      border-radius: 1.125rem;
      padding: 1.25rem;
      margin: 0 1rem 1rem;
    }

    /* ── Dashboard responsive grid ── */
    /* Mobile default: cards stacked (block flow) */
    .dashboard-grid { display: block; }

    /* ── Summary card ── */
    .summary-label {
      font-size: 0.75rem;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-bottom: 0.25rem;
    }
    .summary-amount {
      font-size: 2.75rem;
      font-weight: 700;
      line-height: 1;
      letter-spacing: -0.02em;
    }
    .summary-currency {
      font-size: 1.25rem;
      font-weight: 500;
      color: var(--muted);
      margin-right: 0.25rem;
    }
    .delta-row {
      display: flex;
      align-items: center;
      gap: 0.375rem;
      margin-top: 0.625rem;
    }
    .delta-badge {
      display: inline-flex;
      align-items: center;
      gap: 0.2rem;
      font-size: 0.8rem;
      font-weight: 600;
      padding: 0.2rem 0.5rem;
      border-radius: 0.4rem;
    }
    .delta-badge.up { background: rgba(248,113,113,0.15); color: var(--danger); }
    .delta-badge.down { background: rgba(74,222,128,0.15); color: var(--accent); }
    .delta-badge.flat { background: var(--surface2); color: var(--muted); }
    .delta-label { font-size: 0.75rem; color: var(--muted); }
    .date-range-label {
      font-size: 0.7rem;
      color: var(--muted);
      margin-top: 0.5rem;
    }

    /* ── Chart card ── */
    .chart-title {
      font-size: 0.875rem;
      font-weight: 600;
      margin-bottom: 1rem;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    /* Chart + legend: stacked on mobile, side-by-side on tablet+ */
    .chart-layout {
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    #chart-container {
      /* Mobile: centered, capped at 260px so chart doesn't overwhelm small screens */
      width: 100%;
      max-width: 260px;
      margin: 0 auto;
      display: flex;
      justify-content: center;
    }

    #pie-chart { overflow: visible; }

    /* Legend */
    .legend {
      width: 100%;
      margin-top: 1.25rem;
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
    }
    .legend-item {
      display: flex;
      align-items: center;
      gap: 0.6rem;
      font-size: 0.825rem;
    }
    .legend-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      flex-shrink: 0;
    }
    .legend-name { flex: 1; color: var(--text); }
    .legend-amount { color: var(--muted); font-variant-numeric: tabular-nums; }
    .legend-pct {
      color: var(--muted);
      font-size: 0.75rem;
      width: 3.5rem;
      text-align: right;
    }

    /* ── Empty state ── */
    .empty-state {
      text-align: center;
      padding: 2rem 1rem;
      color: var(--muted);
      font-size: 0.9rem;
    }
    .empty-state .emoji { font-size: 2rem; margin-bottom: 0.5rem; }

    /* ── Loading skeleton ── */
    .skeleton {
      background: linear-gradient(90deg, var(--surface2) 25%, var(--border) 50%, var(--surface2) 75%);
      background-size: 200% 100%;
      animation: shimmer 1.5s infinite;
      border-radius: 0.4rem;
    }
    @keyframes shimmer { to { background-position: -200% 0; } }

    /* ── CTA button ── */
    .cta-btn {
      display: block;
      margin: 0 1rem;
      padding: 0.9rem 1.5rem;
      background: var(--surface);
      color: var(--text);
      border: 1px solid var(--border);
      border-radius: 1rem;
      font-size: 0.95rem;
      font-weight: 600;
      text-align: center;
      text-decoration: none;
      transition: background 0.15s, border-color 0.15s;
    }
    .cta-btn:hover { background: var(--surface2); border-color: #444; }

    /* ── Responsive: Tablet (≥ 768px) ── */
    @media (min-width: 768px) {
      header { padding: 1.5rem 2rem 0.75rem; }
      .filter-bar { padding: 0.5rem 2rem 1rem; }
      .card { margin: 0 2rem 1rem; }
      .cta-btn { margin: 0 2rem; }

      /* Chart and legend side by side within the chart card */
      .chart-layout {
        flex-direction: row;
        align-items: flex-start;
        gap: 1.5rem;
      }

      #chart-container {
        width: 260px;
        max-width: none;
        margin: 0;
        flex-shrink: 0;
      }

      .legend {
        width: auto;
        flex: 1;
        margin-top: 0;
        align-self: center;
      }
    }

    /* ── Responsive: Desktop (≥ 1024px) ── */
    @media (min-width: 1024px) {
      header { padding: 1.75rem 2.5rem 0.75rem; }
      .filter-bar { padding: 0.5rem 2.5rem 1rem; }
      .cta-btn { margin: 0 2.5rem; }

      /* 2-column layout: summary card (1fr) | chart card (2fr) */
      .dashboard-grid {
        display: grid;
        grid-template-columns: minmax(260px, 1fr) 2fr;
        gap: 1rem;
        align-items: start;
        padding: 0 1.5rem;
      }

      .dashboard-grid .card {
        margin: 0 0 1rem;
      }

      #chart-container {
        width: 300px;
      }
    }

    /* ── Responsive: Large desktop (≥ 1280px) ── */
    @media (min-width: 1280px) {
      header { padding: 2rem 3rem 0.75rem; }
      .filter-bar { padding: 0.5rem 3rem 1rem; }
      .dashboard-grid { padding: 0 2rem; }
      .cta-btn { margin: 0 3rem; }
    }
  </style>
</head>
<body>
  <div class="page-wrap">
    <header>
      <div>
        <h1>💸 Expenses</h1>
        <div class="subtitle" id="date-subtitle"></div>
      </div>
    </header>

    <!-- Range filter bar -->
    <nav class="filter-bar" id="filter-bar" aria-label="Time range">
      <button class="pill active" data-range="week">Week</button>
      <button class="pill" data-range="month">Month</button>
      <button class="pill" data-range="last_month">Last Month</button>
      <button class="pill" data-range="ytd">YTD</button>
    </nav>

    <!-- Responsive grid: 1-col on mobile/tablet, 2-col on desktop -->
    <div class="dashboard-grid">
      <!-- Summary card -->
      <div class="card" id="summary-card">
        <div class="summary-label">Total Spending</div>
        <div id="summary-amount" class="summary-amount">
          <span class="skeleton" style="display:inline-block;width:160px;height:2.5rem;">&nbsp;</span>
        </div>
        <div class="delta-row" id="delta-row" style="display:none"></div>
        <div class="date-range-label" id="date-range-label"></div>
      </div>

      <!-- Pie chart card -->
      <div class="card">
        <div class="chart-title">By Category</div>
        <!-- chart-layout: column on mobile, row on tablet+ -->
        <div class="chart-layout">
          <div id="chart-container">
            <svg id="pie-chart"></svg>
          </div>
          <div class="legend" id="legend"></div>
        </div>
      </div>
    </div>

    <!-- View all transactions -->
    <a class="cta-btn" href="/transactions">View All Transactions →</a>
  </div>

  <script>
    // ── Colour palette ───────────────────────────────────────────────────────
    const PALETTE = [
      '#6366f1','#ec4899','#f59e0b','#10b981','#3b82f6',
      '#ef4444','#8b5cf6','#14b8a6','#f97316','#06b6d4',
      '#84cc16','#a855f7','#e11d48',
    ];

    // ── State ────────────────────────────────────────────────────────────────
    let currentRange = 'week';
    let colorMap = {};
    let lastCategoryData = null;

    // ── Helpers ──────────────────────────────────────────────────────────────
    function fmt(n) { return n.toFixed(2).replace(/\B(?=(\d{3})+(?!\d))/g, ','); }

    function rangeLabel(range) {
      return { week: 'This Week', month: 'This Month', last_month: 'Last Month', ytd: 'Year to Date' }[range] || range;
    }

    // ── Filter bar ───────────────────────────────────────────────────────────
    document.getElementById('filter-bar').addEventListener('click', (e) => {
      const btn = e.target.closest('.pill');
      if (!btn) return;
      document.querySelectorAll('.pill').forEach(p => p.classList.remove('active'));
      btn.classList.add('active');
      currentRange = btn.dataset.range;
      loadData(currentRange);
    });

    // ── Data loading ─────────────────────────────────────────────────────────
    async function loadData(range) {
      try {
        const [summaryRes, categoryRes] = await Promise.all([
          fetch(`/api/expenses/summary?range=${range}`),
          fetch(`/api/expenses/by-category?range=${range}`),
        ]);

        if (!summaryRes.ok || !categoryRes.ok) {
          throw new Error('API error');
        }

        const summary = await summaryRes.json();
        const category = await categoryRes.json();

        renderSummary(summary);
        renderChart(category);
      } catch (err) {
        console.error('Failed to load data:', err);
        document.getElementById('summary-amount').textContent = '—';
      }
    }

    // ── Summary card ─────────────────────────────────────────────────────────
    function renderSummary(data) {
      const amountEl = document.getElementById('summary-amount');
      amountEl.innerHTML = `<span class="summary-currency">${data.currency}</span>${fmt(data.total)}`;

      const deltaRow = document.getElementById('delta-row');
      deltaRow.style.display = 'flex';
      const delta = data.delta;
      const pct = data.deltaPercent;
      let badgeClass = 'flat', arrow = '→', sign = '';
      if (delta > 0) { badgeClass = 'up'; arrow = '↑'; sign = '+'; }
      else if (delta < 0) { badgeClass = 'down'; arrow = '↓'; }
      const pctStr = pct !== null ? ` (${sign}${pct}%)` : '';
      deltaRow.innerHTML =
        `<span class="delta-badge ${badgeClass}">${arrow} ${sign}${data.currency} ${fmt(Math.abs(delta))}${pctStr}</span>` +
        `<span class="delta-label">vs previous period</span>`;

      document.getElementById('date-range-label').textContent =
        `${data.startDate} → ${data.endDate}`;
      document.getElementById('date-subtitle').textContent = rangeLabel(currentRange);
    }

    // ── D3 Pie chart (responsive via ResizeObserver) ──────────────────────────
    const MIN_CHART_SIZE = 160;
    const MAX_CHART_SIZE = 340;

    let chartSize = MIN_CHART_SIZE;
    let outerR = chartSize / 2 - 10;
    let innerR = outerR * 0.55;

    const svg = d3.select('#pie-chart')
      .attr('width', chartSize)
      .attr('height', chartSize)
      .attr('viewBox', `0 0 ${chartSize} ${chartSize}`);

    const g = svg.append('g')
      .attr('transform', `translate(${chartSize / 2},${chartSize / 2})`);

    const arc = d3.arc().innerRadius(innerR).outerRadius(outerR);
    const pie = d3.pie().value(d => d.total).sort(null);

    // Store previous angles for tweened transitions
    const prevAngles = new Map();

    function arcTween(d) {
      const key = d.data.category;
      const prev = prevAngles.get(key) || { startAngle: d.startAngle, endAngle: d.startAngle };
      const interp = d3.interpolate(prev, d);
      return function(t) {
        const current = interp(t);
        prevAngles.set(key, current);
        return arc(current);
      };
    }

    /**
     * Reads the chart container's current clientWidth and updates the SVG
     * dimensions and arc generator radii. Returns true if dimensions changed
     * (used by ResizeObserver to decide whether to re-render).
     */
    function updateChartSvgSize() {
      const container = document.getElementById('chart-container');
      const containerWidth = container.clientWidth;
      if (!containerWidth) return false;

      const newSize = Math.min(Math.max(containerWidth, MIN_CHART_SIZE), MAX_CHART_SIZE);
      if (Math.abs(newSize - chartSize) < 8) return false;

      chartSize = newSize;
      outerR = chartSize / 2 - 10;
      innerR = outerR * 0.55;

      svg
        .attr('width', chartSize)
        .attr('height', chartSize)
        .attr('viewBox', `0 0 ${chartSize} ${chartSize}`);

      g.attr('transform', `translate(${chartSize / 2},${chartSize / 2})`);
      arc.innerRadius(innerR).outerRadius(outerR);

      return true;
    }

    // Re-render chart when container dimensions change (e.g. window resize,
    // breakpoint transitions between single-column and side-by-side layouts).
    const chartResizeObserver = new ResizeObserver(() => {
      if (updateChartSvgSize() && lastCategoryData) {
        renderChart(lastCategoryData);
      }
    });
    chartResizeObserver.observe(document.getElementById('chart-container'));

    function renderChart(data) {
      lastCategoryData = data;
      // Ensure SVG dimensions match the current container size before rendering.
      updateChartSvgSize();

      const items = data.items;

      // Assign stable colours per category
      items.forEach(d => {
        if (!colorMap[d.category]) {
          const idx = Object.keys(colorMap).length % PALETTE.length;
          colorMap[d.category] = PALETTE[idx];
        }
      });

      if (items.length === 0) {
        svg.attr('height', 0);
        document.getElementById('legend').innerHTML =
          '<div class="empty-state"><div class="emoji">📭</div>No expenses in this period</div>';
        return;
      }

      svg.attr('height', chartSize);
      const arcs = pie(items);

      const paths = g.selectAll('path').data(arcs, d => d.data.category);

      // Enter
      paths.enter()
        .append('path')
        .attr('fill', d => colorMap[d.data.category])
        .attr('stroke', '#0f0f0f')
        .attr('stroke-width', 2)
        .each(function(d) { prevAngles.set(d.data.category, { startAngle: d.startAngle, endAngle: d.startAngle }); })
        .merge(paths)
        .transition()
        .duration(500)
        .ease(d3.easeCubicInOut)
        .attrTween('d', arcTween)
        .attr('fill', d => colorMap[d.data.category]);

      // Exit
      paths.exit()
        .transition()
        .duration(300)
        .attrTween('d', function(d) {
          const interp = d3.interpolate(d, { startAngle: d.endAngle, endAngle: d.endAngle });
          return t => arc(interp(t));
        })
        .remove();

      // Legend
      const legend = document.getElementById('legend');
      legend.innerHTML = items.map(d =>
        `<div class="legend-item">
          <div class="legend-dot" style="background:${colorMap[d.category]}"></div>
          <span class="legend-name">${d.category}</span>
          <span class="legend-amount">CAD ${fmt(d.total)}</span>
          <span class="legend-pct">${d.percent}%</span>
        </div>`
      ).join('');
    }

    // ── Init ─────────────────────────────────────────────────────────────────
    loadData(currentRange);
  </script>
</body>
</html>
