<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <title>Session Expired — Expense Tracker</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #0f0f0f;
      color: #f0f0f0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1rem;
    }

    .card {
      background: #1a1a1a;
      border-radius: 1.25rem;
      padding: 2.5rem 2rem;
      max-width: 380px;
      width: 100%;
      text-align: center;
      box-shadow: 0 8px 32px rgba(0,0,0,0.4);
    }

    .icon {
      font-size: 3rem;
      margin-bottom: 1rem;
    }

    h1 {
      font-size: 1.5rem;
      font-weight: 700;
      margin-bottom: 0.75rem;
    }

    p {
      color: #888;
      font-size: 0.95rem;
      line-height: 1.6;
    }

    .hint {
      margin-top: 1.75rem;
      background: #252525;
      border-radius: 0.75rem;
      padding: 1rem 1.25rem;
      font-size: 0.875rem;
      color: #aaa;
      text-align: left;
    }

    .hint strong { color: #f0f0f0; }
    .hint code {
      background: #333;
      padding: 0.15rem 0.4rem;
      border-radius: 0.3rem;
      font-family: "SF Mono", "Fira Code", monospace;
      font-size: 0.85rem;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="icon">🔒</div>
    <h1 id="heading">Session Expired</h1>
    <p id="message">Your dashboard link has expired or has already been used.</p>
    <div class="hint">
      <strong>To get a new link:</strong><br /><br />
      Send <code>dashboard</code> on WhatsApp and tap the fresh link within 15 minutes.
    </div>
  </div>

  <script>
    const params = new URLSearchParams(window.location.search);
    const reason = params.get('reason');
    const heading = document.getElementById('heading');
    const message = document.getElementById('message');
    if (reason === 'no_session') {
      heading.textContent = 'Access Denied';
      message.textContent = 'You need a valid magic link to access this page.';
    } else if (reason === 'missing_token') {
      heading.textContent = 'Invalid Link';
      message.textContent = 'The link you followed is missing a token.';
    }
  </script>
</body>
</html>
